<div class="container">
  <h2 class="mb-3">Modifier le client #{{ customerId }}</h2>

  <form class="card card-body shadow-sm" [formGroup]="form" (ngSubmit)="handleUpdate()">
    <div class="mb-3">
      <label class="form-label" for="name">Nom</label>
      <input id="name" type="text" class="form-control" formControlName="name" />
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <div class="text-danger small">Nom obligatoire (2 caractères minimum).</div>
      }
    </div>
    <div class="mb-3">
      <label class="form-label" for="email">Email</label>
      <input id="email" type="email" class="form-control" formControlName="email" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <div class="text-danger small">Email valide obligatoire.</div>
      }
    </div>

    @if (errorMessage) {
      <div class="alert alert-danger">{{ errorMessage }}</div>
    }

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Mettre à jour</button>
      <a routerLink="/customers" class="btn btn-secondary">Annuler</a>
    </div>
  </form>
</div>
