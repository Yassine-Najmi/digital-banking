spring.application.name=ebank-backend
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3307/ebank-db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=ebankDigitalBankingSecretKeyForHmacSha256MustBeLongEnough123

# OpenAI : la clé est lue uniquement depuis la variable d'environnement OPENAI_API_KEY
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

ebank.rag.vector-store-path=./data/ebank-vector-store.json
ebank.rag.document=classpath:/rag/guide-produits-ebank.md
